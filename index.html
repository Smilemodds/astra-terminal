<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRA Terminal | Built by 𝐒𝚳𝚰𝐋𝚵</title>
    
    <!-- Xterm.js CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Courier New', monospace;
        }

        /* Top Bar */
        .top-bar {
            background: #0d0d1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand {
            color: #00f0ff;
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 3px;
        }

        .built-by {
            color: #b347ea;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        .whatsapp-btn:hover {
            background: #128C7E;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        /* Terminal Container */
        #terminal-container {
            flex: 1;
            padding: 10px;
            background: #0b0b14;
        }

        #terminal {
            height: 100%;
            border-radius: 5px;
        }

        /* Status Bar */
        .status-bar {
            background: #0d0d1a;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            color: #8888aa;
            font-size: 0.75rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px #00ff88;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .top-bar {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            .brand {
                font-size: 1rem;
            }
            .whatsapp-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .status-bar {
                font-size: 0.65rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <span class="brand">◈ ASTRA</span>
        <span>Built by <span class="built-by">𝐒𝚳𝚰𝐋𝚵</span></span>
        <a href="https://whatsapp.com/channel/0029Vb794NKBadmdwkPN6i0B" target="_blank" class="whatsapp-btn">
            💬 Join Channel
        </a>
    </div>

    <!-- Terminal -->
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span><span class="status-dot"></span> CONNECTED</span>
        <span>Type <b style="color:#00f0ff;">help</b> for commands</span>
        <span id="clock">00:00:00</span>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.8.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.9.0/lib/addon-web-links.min.js"></script>

    <script>
        // ==========================================
        // CLOCK
        // ==========================================
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==========================================
        // TERMINAL SETUP
        // ==========================================
        const term = new Terminal({
            cursorBlink: true,
            fontFamily: "'Courier New', monospace",
            fontSize: 14,
            theme: {
                background: '#0b0b14',
                foreground: '#e0e0f0',
                cursor: '#00f0ff',
                selectionBackground: 'rgba(0, 240, 255, 0.3)',
                green: '#00ff88',
                yellow: '#ffd700',
                blue: '#00f0ff',
                magenta: '#b347ea',
                cyan: '#00f0ff',
                red: '#ff2d95',
            },
        });

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);

        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        window.addEventListener('resize', () => fitAddon.fit());

        // ==========================================
        // COMMANDS
        // ==========================================
        const commands = {
            help: () => {
                return [
                    '',
                    '  \x1b[1;36mAVAILABLE COMMANDS:\x1b[0m',
                    '  ─────────────────',
                    '  \x1b[1;33mhelp\x1b[0m      Show this menu',
                    '  \x1b[1;33mabout\x1b[0m     About ASTRA',
                    '  \x1b[1;33mclear\x1b[0m     Clear screen',
                    '  \x1b[1;33mdate\x1b[0m      Current date/time',
                    '  \x1b[1;33mwhoami\x1b[0m    Show user',
                    '  \x1b[1;33mneofetch\x1b[0m  System info',
                    '  \x1b[1;33mcontact\x1b[0m   WhatsApp link',
                    '  \x1b[1;33mecho\x1b[0m      Repeat text',
                    '  \x1b[1;33mquote\x1b[0m     Random quote',
                    '  \x1b[1;33msudo\x1b[0m      Try it 😏',
                    '',
                ].join('\n');
            },

            about: () => [
                '',
                '  \x1b[1;36mASTRA Terminal v1.0\x1b[0m',
                '  Cloud terminal for developers.',
                '  \x1b[1;35mBuilt by 𝐒𝚳𝚰𝐋𝚵\x1b[0m',
                '',
            ].join('\n'),

            clear: () => { term.clear(); return ''; },

            date: () => '\x1b[1;32m' + new Date().toString() + '\x1b[0m',

            whoami: () => '\x1b[1;33mastra-user@cloud\x1b[0m',

            neofetch: () => [
                '',
                '  \x1b[1;36m   .--.   \x1b[0m  \x1b[1;33mASTRA@Cloud\x1b[0m',
                '  \x1b[1;36m  |o_o |  \x1b[0m  OS: ASTRA Terminal v1.0',
                '  \x1b[1;36m  |:_/ |  \x1b[0m  Creator: 𝐒𝚳𝚰𝐋𝚵',
                '  \x1b[1;36m //   \\\\ \x1b[0m  Theme: Cyberpunk',
                '',
            ].join('\n'),

            contact: () => [
                '',
                '  \x1b[1;32mWhatsApp Channel:\x1b[0m',
                '  https://whatsapp.com/channel/0029Vb794NKBadmdwkPN6i0B',
                '',
            ].join('\n'),

            echo: (args) => args.join(' '),

            quote: () => {
                const quotes = [
                    '"Code is like humor. When you have to explain it, it\'s bad." — Cory House',
                    '"First, solve the problem. Then, write the code." — John Johnson',
                    '"Simplicity is the soul of efficiency." — Austin Freeman',
                ];
                return '\x1b[1;33m' + quotes[Math.floor(Math.random() * quotes.length)] + '\x1b[0m';
            },

            sudo: () => '\x1b[1;31m⚠️  Nice try! This is a demo terminal. 😄\x1b[0m',
        };

        // ==========================================
        // INPUT HANDLING
        // ==========================================
        const prompt = '\x1b[1;32m┌─(\x1b[0m\x1b[1;33mastra\x1b[0m\x1b[1;32m@\x1b[0m\x1b[1;36mcloud\x1b[0m\x1b[1;32m)-[\x1b[0m\x1b[1;35m~\x1b[0m\x1b[1;32m]\x1b[0m\n\x1b[1;32m└─$ \x1b[0m';

        let currentInput = '';
        const history = [];
        let historyPos = 0;

        term.onData((data) => {
            const code = data.charCodeAt(0);

            // Enter key
            if (code === 13) {
                term.write('\r\n');
                const cmd = currentInput.trim();
                if (cmd) {
                    history.push(cmd);
                    historyPos = history.length;
                    const parts = cmd.split(/\s+/);
                    const commandName = parts[0].toLowerCase();
                    const args = parts.slice(1);

                    if (commands[commandName]) {
                        const result = commands[commandName](args);
                        if (result) term.writeln(result);
                    } else {
                        term.writeln(`\x1b[1;31mCommand not found:\x1b[0m ${commandName}`);
                        term.writeln('Type \x1b[1;33mhelp\x1b[0m for available commands.');
                    }
                }
                currentInput = '';
                term.write(prompt);
                return;
            }

            // Backspace
            if (code === 127) {
                if (currentInput.length > 0) {
                    currentInput = currentInput.slice(0, -1);
                    term.write('\b \b');
                }
                return;
            }

            // Ctrl+L = clear
            if (code === 12) {
                term.clear();
                term.write(prompt + currentInput);
                return;
            }

            // Ctrl+C = cancel
            if (code === 3) {
                currentInput = '';
                term.write('^C\r\n');
                term.write(prompt);
                return;
            }

            // Up arrow
            if (data === '\x1b[A') {
                if (history.length > 0 && historyPos > 0) {
                    historyPos--;
                    while (currentInput.length > 0) {
                        term.write('\b \b');
                        currentInput = currentInput.slice(0, -1);
                    }
                    currentInput = history[historyPos];
                    term.write(currentInput);
                }
                return;
            }

            // Down arrow
            if (data === '\x1b[B') {
                if (historyPos < history.length - 1) {
                    historyPos++;
                    while (currentInput.length > 0) {
                        term.write('\b \b');
                        currentInput = currentInput.slice(0, -1);
                    }
                    currentInput = history[historyPos];
                    term.write(currentInput);
                } else {
                    historyPos = history.length;
                    while (currentInput.length > 0) {
                        term.write('\b \b');
                        currentInput = currentInput.slice(0, -1);
                    }
                }
                return;
            }

            // Normal characters
            if (code >= 32 && code <= 126) {
                currentInput += data;
                term.write(data);
            }
        });

        // ==========================================
        // START
        // ==========================================
        term.writeln([
            '',
            '  \x1b[1;36m╔══════════════════════════════════╗\x1b[0m',
            '  \x1b[1;36m║     █████╗ ███████╗████████╗    ║\x1b[0m',
            '  \x1b[1;36m║    ██╔══██╗██╔════╝╚══██╔══╝    ║\x1b[0m',
            '  \x1b[1;36m║    ███████║███████╗   ██║       ║\x1b[0m',
            '  \x1b[1;36m║    ██╔══██║╚════██║   ██║       ║\x1b[0m',
            '  \x1b[1;36m║    ██║  ██║███████║   ██║       ║\x1b[0m',
            '  \x1b[1;36m║    ╚═╝  ╚═╝╚══════╝   ╚═╝       ║\x1b[0m',
            '  \x1b[1;36m║  TERMINAL v1.0 — Built by 𝐒𝚳𝚰𝐋𝚵  ║\x1b[0m',
            '  \x1b[1;36m╚══════════════════════════════════╝\x1b[0m',
            '',
            '  \x1b[1;36m✦ Welcome to ASTRA ✦\x1b[0m',
            '  Type \x1b[1;33mhelp\x1b[0m to get started.',
            '  WhatsApp: \x1b[1;32mhttps://whatsapp.com/channel/0029Vb794NKBadmdwkPN6i0B\x1b[0m',
            '',
        ].join('\r\n'));

        term.write(prompt);
        term.focus();

        // Click anywhere on terminal to focus
        document.getElementById('terminal').addEventListener('click', () => {
            term.focus();
        });
    </script>

</body>
</html>
