<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- ============================================ -->
    <!-- LOADING SCREEN -->
    <!-- ============================================ -->
    <div id="loading-screen">
        <canvas id="particle-canvas"></canvas>
        <div class="loader-container">
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="ASTRA">ASTRA</h1>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="loading-text">
                <span id="loading-status">INITIALIZING SYSTEM...</span>
                <span class="cursor-blink">█</span>
            </div>
            <div class="loading-subtitle">Terminal v1.0 • Built by 𝐒𝚳𝚰𝐋𝚵</div>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- MAIN APPLICATION -->
    <!-- ============================================ -->
    <div id="main-app" style="display: none;">
        
        <!-- Top Navigation Bar -->
        <header class="top-bar">
            <div class="brand">
                <span class="brand-icon">◈</span>
                <span class="brand-name">ASTRA</span>
                <span class="brand-version">v1.0</span>
            </div>
            <div class="header-center">

                <span class="creator-name">𝐒𝚳𝚰𝐋𝚵</span>
            </div>
            <div class="header-actions">
                <a href="https://whatsapp.com/channel/0029Vb794NKBadmdwkPN6i0B"

                </a>
            </div>
        </header>
        
        <!-- Terminal Container -->
        <main class="terminal-wrapper">
            <div id="terminal"></div>
            <div class="terminal-glow"></div>
            <div class="terminal-scanline"></div>
        </main>
        
        <!-- Bottom Status Bar -->
        <footer class="status-bar">
            <div class="status-left">
                <span class="status-dot online"></span>
                <span>CONNECTED</span>
                <span class="status-separator">|</span>
                <span id="connection-type">SECURE</span>
            </div>
            <div class="status-center">
                <span class="key-hint">Type <code>help</code> for commands</span>
                <span class="status-separator">|</span>
                <span class="key-hint">Press <code>Ctrl+L</code> to clear</span>
            </div>
            <div class="status-right">
                <span id="status-time">00:00:00</span>
            </div>
        </footer>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.8.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.9.0/lib/addon-web-links.min.js"></script>
    <script src="script.js"></script>

</html>
